name: Release Simba PMS 2.6.0-J

on:
  workflow_dispatch:
  push:
    tags:
      - "v2.6.0-J"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-simba-pms-2.6.0-J
  cancel-in-progress: false

env:
  COMPOSE_FILE: compose.ci.yml
  RELEASE_VERSION: "2.6.0-J"

jobs:
  test-amd64:
    name: Test amd64
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Compose configuration
        run: docker compose -f "$COMPOSE_FILE" config

      - name: Build backend test image
        run: docker build --progress=plain -t simba-pms-backend:ci ./backend

      - name: Build frontend test image
        run: docker build --progress=plain -t simba-pms-web:ci ./frontend

      - name: Start clean integration stack
        run: |
          docker compose -f "$COMPOSE_FILE" down -v --remove-orphans || true
          docker compose -f "$COMPOSE_FILE" up -d --wait --wait-timeout 180

      - name: Show service status
        run: docker compose -f "$COMPOSE_FILE" ps -a

      - name: Verify schema migrations
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T db \
            psql \
              -v ON_ERROR_STOP=1 \
              -U simba \
              -d simba_pms \
              -c "SELECT filename, applied_at FROM app_schema_migrations ORDER BY applied_at;"

      - name: Verify backend health
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T backend \
            node -e "
              fetch('http://127.0.0.1:3000/health')
                .then(async response => {
                  const body = await response.text();
                  console.log(body);
                  if (!response.ok) process.exit(1);
                })
                .catch(error => {
                  console.error(error);
                  process.exit(1);
                });
            "

      - name: Verify frontend health
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T web \
            wget --tries=5 --timeout=10 -qO- http://127.0.0.1/health

      - name: Verify frontend can reach API
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T web \
            wget --tries=5 --timeout=10 -qO- http://127.0.0.1/api/health

      - name: Test Excel import and export
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend \
            node tests/integration-smoke.js

      - name: Test Schedule and Notifications
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend node tests/schedule-notifications-smoke.js

      - name: Test Material Master Data 2.4.0-A
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend node tests/material-master-data-smoke.js

      - name: Test Material Planning and Reservations 2.4.0-B1
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend node tests/material-planning-reservations-smoke.js

      - name: Test Inventory Transactions 2.4.0-C
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend node tests/inventory-transactions-smoke.js

      - name: Test Project Material Integration 2.4.0-D
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend node tests/project-material-integration-smoke.js

      - name: Test Project Closeout 2.5.0
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend node tests/project-closeout-smoke.js

      - name: Test Daily Shopfloor Work Board 2.6.0-A
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend node tests/shopfloor-work-board-smoke.js

      - name: Test Direct Project Tasks and Order Fulfillment 2.6.0-J
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web \
            backend node tests/direct-project-order-fulfillment-smoke.js

      - name: Test Order Execution History 2.6.0-J
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T \
            -e TEST_BASE_URL=http://web/api \
            backend node tests/order-execution-history-smoke.js

      - name: Test database backup and restore
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T db \
            pg_dump \
              -U simba \
              -Fc \
              simba_pms \
              > /tmp/pms-ci.dump

          test -s /tmp/pms-ci.dump

          docker compose -f "$COMPOSE_FILE" exec -T db \
            dropdb \
              -U simba \
              --if-exists \
              restore_test

          docker compose -f "$COMPOSE_FILE" exec -T db \
            createdb \
              -U simba \
              restore_test

          cat /tmp/pms-ci.dump |
            docker compose -f "$COMPOSE_FILE" exec -T db \
              pg_restore \
                -U simba \
                -d restore_test \
                --no-owner \
                --no-privileges \
                --exit-on-error

          docker compose -f "$COMPOSE_FILE" exec -T db \
            psql \
              -v ON_ERROR_STOP=1 \
              -U simba \
              -d restore_test \
              -c "SELECT count(*) AS migration_count FROM app_schema_migrations;"

      - name: Show container logs on failure
        if: failure()
        continue-on-error: true
        run: |
          echo "===== CONTAINER STATUS ====="
          docker compose -f "$COMPOSE_FILE" ps -a || true

          echo "===== DATABASE LOGS ====="
          docker compose -f "$COMPOSE_FILE" logs \
            --no-color \
            --tail=300 \
            db || true

          echo "===== BACKEND LOGS ====="
          docker compose -f "$COMPOSE_FILE" logs \
            --no-color \
            --tail=500 \
            backend || true

          echo "===== WEB LOGS ====="
          docker compose -f "$COMPOSE_FILE" logs \
            --no-color \
            --tail=300 \
            web || true

      - name: Stop integration stack
        if: always()
        continue-on-error: true
        run: |
          docker compose -f "$COMPOSE_FILE" down \
            -v \
            --remove-orphans

  publish:
    name: Publish ${{ matrix.name }} image
    needs: test-amd64
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: web
            context: ./frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/simba-pms-${{ matrix.name }}:${{ env.RELEASE_VERSION }}
            ghcr.io/${{ github.repository_owner }}/simba-pms-${{ matrix.name }}:2.6
          labels: |
            org.opencontainers.image.title=Simba PMS ${{ matrix.name }}
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
