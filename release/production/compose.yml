name: simba-pms
services:
  db:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-production_management}
      POSTGRES_USER: ${POSTGRES_USER:-pms_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pms_app} -d ${POSTGRES_DB:-production_management}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks: [pms]
  backend:
    image: ghcr.io/${IMAGE_OWNER:-wannamax}/simba-pms-backend:${APP_VERSION:-2.2.0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-production_management}
      DB_USER: ${POSTGRES_USER:-pms_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    depends_on:
      db: {condition: service_healthy}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 50s
    networks: [pms]
  web:
    image: ghcr.io/${IMAGE_OWNER:-wannamax}/simba-pms-web:${APP_VERSION:-2.2.0}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend: {condition: service_healthy}
    networks: [pms]
volumes:
  postgres_data:
  uploads_data:
networks:
  pms:
    driver: bridge
