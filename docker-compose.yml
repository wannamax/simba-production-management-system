services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simba_pms}
      POSTGRES_USER: ${POSTGRES_USER:-simba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simba} -d ${POSTGRES_DB:-simba_pms}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks: [pms]
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-simba_pms}
      DB_USER: ${POSTGRES_USER:-simba}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - uploads_data:/app/uploads
    networks: [pms]
  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks: [pms]
volumes:
  postgres_data:
  uploads_data:
networks:
  pms:
    driver: bridge
